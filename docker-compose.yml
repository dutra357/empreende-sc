services:
  api-empreendimentos:
    build: .
    container_name: app-empreendimentos
    ports:
      - "8080:8080"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/empreendimentos"]
      interval: 30s
      timeout: 5s
      retries: 3